name: CI

on:
  push:
    branches: [ main, moveit-branch ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup ROS2 Foxy
        uses: ros-tooling/setup-ros@v0.1
        with:
          distribution: foxy
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-colcon-common-extensions python3-vcstool
      - name: Build workspace
        run: |
          source /opt/ros/foxy/setup.bash
          colcon build --event-handlers console_cohesion+
      - name: Run (skipped in CI)
        run: echo "Integration tests are environment-specific and are skipped in CI by default."
